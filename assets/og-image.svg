<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38e8b0"/><stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.22"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#38e8b0" stop-opacity="0.20"/><stop offset="1" stop-color="#38e8b0" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0 H0 V48" fill="none" stroke="#1e2836" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- full-bleed background (square; center 630 band becomes the OG) -->
  <rect width="1200" height="1200" fill="#070b10"/>
  <rect width="1200" height="1200" fill="url(#grid)" opacity="0.55"/>
  <circle cx="980" cy="360" r="420" fill="url(#glow1)"/>
  <circle cx="180" cy="900" r="400" fill="url(#glow2)"/>

  <!-- ===== content lives within y 300..900 (the cropped band) ===== -->

  <!-- security perimeter -->
  <rect x="48" y="330" width="1104" height="540" rx="22" fill="none" stroke="#fbbf5c" stroke-opacity="0.28" stroke-width="1.5" stroke-dasharray="8 8"/>
  <text x="72" y="374" font-family="Menlo, monospace" font-size="15" letter-spacing="2" fill="#fbbf5c" fill-opacity="0.7">SECURITY PERIMETER · SIEM / SOC</text>

  <!-- node graph motif -->
  <g stroke="#2a374a" stroke-width="2" fill="none">
    <path d="M868 760 L968 690"/><path d="M968 690 L1068 730"/><path d="M968 690 L988 590"/>
  </g>
  <g fill="#0e141d" stroke="#38e8b0" stroke-width="2">
    <circle cx="868" cy="760" r="16"/><circle cx="968" cy="690" r="20"/><circle cx="1068" cy="730" r="16"/><circle cx="988" cy="590" r="16"/>
  </g>

  <!-- brand mark -->
  <rect x="72" y="410" width="86" height="86" rx="20" fill="url(#brand)"/>
  <text x="115" y="470" font-family="Menlo, monospace" font-size="34" font-weight="700" fill="#081014" text-anchor="middle">T.T</text>

  <!-- name + role + tagline -->
  <text x="72" y="600" font-family="Helvetica, Arial, sans-serif" font-size="76" font-weight="700" fill="#e9eef6">Alexandre Tsumanuma</text>
  <text x="74" y="660" font-family="Helvetica, Arial, sans-serif" font-size="36" font-weight="600" fill="#38e8b0">Cybersecurity Architect · AI · Cloud</text>
  <text x="74" y="716" font-family="Helvetica, Arial, sans-serif" font-size="26" fill="#8391a5">Secure, intelligent and scalable systems — from code to production.</text>

  <!-- footer -->
  <text x="72" y="836" font-family="Menlo, monospace" font-size="18" letter-spacing="1" fill="#5c6879">tsumanuma tech solutions · weyzin.github.io</text>
</svg>
